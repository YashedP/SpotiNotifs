services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      HOME: /tmp
      SERVICE_NAME: server
      PORT: "80"
    env_file:
      - .env
    command: ["gunicorn", "--bind", "0.0.0.0:80", "add_user:app"]
    init: true
    expose:
      - "80"
    volumes:
      - spotinotifs_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  notifier:
    build:
      context: .
      dockerfile: Dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      HOME: /tmp
      SERVICE_NAME: notifier
      TZ: America/New_York
    env_file:
      - .env
    command: ["python", "spotify.py"]
    init: true
    volumes:
      - spotinotifs_data:/app/data
    profiles:
      - jobs
    restart: "no"

volumes:
  spotinotifs_data:
    name: spotinotifs_data
